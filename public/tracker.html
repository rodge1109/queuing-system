<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King's Fleet Tracker | Device Beacon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .pulse { animation: pulse 2s infinite; }
        .pulse-red { animation: pulse-red 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-6 overflow-hidden">
    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="w-full max-w-md glass p-10 rounded-[40px] text-center space-y-8 shadow-2xl">
        <div class="w-24 h-24 bg-[#0f62fe] rounded-[30px] mx-auto flex items-center justify-center shadow-2xl shadow-blue-500/40 relative">
            <div class="absolute inset-0 bg-blue-400 rounded-[30px] animate-ping opacity-20"></div>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white relative z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </div>
        <div>
            <h1 class="text-3xl font-black uppercase italic tracking-tighter">Fleet Beacon</h1>
            <p class="text-gray-400 text-sm mt-3 font-medium px-4">Register this device to start broadcasting your location to the control center.</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="rider-name" placeholder="Rider Name / ID" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center font-bold text-lg focus:outline-none focus:border-[#0f62fe] transition-all uppercase placeholder:text-gray-600">
            <button id="start-tracking" class="w-full py-5 bg-[#0f62fe] rounded-2xl font-black uppercase tracking-widest hover:bg-blue-600 transition-all shadow-xl shadow-blue-900/40">Go Live Now</button>
        </div>
    </div>

    <!-- ACTIVE TRACKING SCREEN -->
    <div id="active-screen" class="hidden w-full max-w-md space-y-4 animate-fadeIn">
        <!-- Message Alert (Hidden by default) -->
        <div id="message-alert" class="hidden glass bg-blue-600/20 border-blue-500/50 p-6 rounded-[30px] animate-bounce relative z-50">
            <div class="flex items-start gap-4">
                <div class="p-3 bg-blue-600 rounded-2xl text-white"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg></div>
                <div class="flex-1">
                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">Incoming Message</p>
                    <p id="alert-text" class="text-sm font-bold text-white">Drive safely. New booking assigned.</p>
                </div>
                <button onclick="document.getElementById('message-alert').classList.add('hidden')" class="text-white/50 hover:text-white"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
            </div>
        </div>

        <div class="glass p-6 rounded-[40px] text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4">
                <span id="status-badge" class="px-3 py-1 bg-green-500/20 text-green-400 text-[10px] font-black uppercase tracking-widest rounded-full border border-green-500/30">Online</span>
            </div>
            
            <div class="relative w-24 h-24 mx-auto mb-4">
                <div class="absolute inset-0 bg-[#0f62fe] rounded-full opacity-20 pulse"></div>
                <div class="relative w-full h-full bg-[#0f62fe] rounded-full flex items-center justify-center shadow-2xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071a9.05 9.05 0 0112.14 0m-15.38-5.303a13.5 13.5 0 0118.626 0" />
                    </svg>
                </div>
            </div>
            <h2 id="display-name" class="text-2xl font-black uppercase italic tracking-tighter truncate">---</h2>
            <p id="transmission-id" class="text-blue-500/60 font-mono text-[9px] uppercase tracking-widest">ID: WAITING...</p>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="glass p-4 rounded-3xl">
                <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest mb-1">Speed</p>
                <div class="flex items-end gap-1">
                    <p id="speed" class="text-xl font-black">0.0</p>
                    <span class="text-[8px] font-bold text-gray-400 mb-1">KM/H</span>
                </div>
            </div>
            <div class="glass p-4 rounded-3xl">
                <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest mb-1">Battery</p>
                <div class="flex items-end gap-1">
                    <p id="battery" class="text-xl font-black">--%</p>
                    <span id="battery-status" class="text-[8px] font-bold text-green-400 mb-1">OK</span>
                </div>
            </div>
        </div>

        <!-- SOS BUTTON -->
        <button id="sos-btn" class="w-full py-8 bg-red-600/10 border-2 border-red-600/30 rounded-[30px] flex flex-col items-center justify-center gap-2 group hover:bg-red-600/20 transition-all pulse-red">
            <div class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center text-white shadow-xl shadow-red-900/50 group-active:scale-90 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
            </div>
            <p class="text-red-500 font-black uppercase tracking-[5px] text-xs">Emergency SOS</p>
            <p class="text-red-400/50 text-[8px] font-bold uppercase">Hold for 3 seconds to trigger</p>
        </button>

        <div class="glass p-4 rounded-3xl">
            <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest mb-2">Operational Log</p>
            <div id="log-container" class="h-16 overflow-y-auto text-[9px] font-mono text-gray-400 space-y-1 custom-scrollbar"></div>
        </div>

        <button id="stop-tracking" class="w-full py-3 text-white/20 text-[8px] font-black uppercase tracking-[3px] hover:text-white transition-all">Terminate Broadcast</button>
    </div>

    <script>
        let watchId = null;
        let lastSyncTime = Date.now();
        let sosActive = false;
        const riderId = "DEV-" + Math.random().toString(36).substr(2, 6).toUpperCase();

        const addLog = (msg) => {
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.innerHTML = `<span class="text-blue-500/50">[${new Date().toLocaleTimeString([], {hour12:false})}]</span> ${msg}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        };

        // SOS HOLD LOGIC
        let sosTimer;
        const sosBtn = document.getElementById('sos-btn');
        sosBtn.onmousedown = sosBtn.ontouchstart = () => {
            sosBtn.classList.add('bg-red-600/40');
            sosTimer = setTimeout(() => {
                sosActive = !sosActive;
                sosBtn.innerHTML = sosActive ? 
                    `<div class='text-white font-black uppercase tracking-widest'>SOS ACTIVE</div><p class='text-[8px] text-white/50'>Tap to Cancel</p>` :
                    `<div class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center text-white shadow-xl shadow-red-900/50 group-active:scale-90 transition-all"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg></div><p class="text-red-500 font-black uppercase tracking-[5px] text-xs">Emergency SOS</p><p class="text-red-400/50 text-[8px] font-bold uppercase">Hold for 3 seconds to trigger</p>`;
                
                fetch('/api/fleet/status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: riderId, status: sosActive ? 'SOS' : 'Available' })
                });
                
                if(sosActive) {
                    sosBtn.classList.replace('bg-red-600/10', 'bg-red-600');
                    addLog("CRITICAL: SOS SIGNAL SENT");
                    if(navigator.vibrate) navigator.vibrate([100, 30, 100, 30, 100]);
                } else {
                    sosBtn.classList.replace('bg-red-600', 'bg-red-600/10');
                    addLog("SOS Signal Cancelled");
                }
            }, 3000);
        };
        sosBtn.onmouseup = sosBtn.onmouseleave = sosBtn.ontouchend = () => {
            clearTimeout(sosTimer);
            if(!sosActive) sosBtn.classList.remove('bg-red-600/40');
        };

        document.getElementById('start-tracking').onclick = async () => {
            const name = document.getElementById('rider-name').value;
            if (!name) return alert('Enter Name');
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('active-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = name;
            document.getElementById('transmission-id').innerText = `ID: ${riderId}`;

            const updateBattery = async () => {
                try {
                    const batt = await navigator.getBattery();
                    document.getElementById('battery').innerText = Math.round(batt.level * 100) + '%';
                    return Math.round(batt.level * 100);
                } catch(e) { return 0; }
            };

            const sendUpdate = async (pos) => {
                const batt = await updateBattery();
                const { latitude, longitude, speed } = pos.coords;
                document.getElementById('speed').innerText = speed ? (speed * 3.6).toFixed(1) : "0.0";
                lastSyncTime = Date.now();

                fetch('/api/fleet/update-location', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: riderId, name, lat: latitude, lng: longitude, speed, battery: batt, status: sosActive ? 'SOS' : 'Available'
                    })
                }).then(r => r.json()).then(data => {
                    if (data.messages && data.messages.length > 0) {
                        const lastMsg = data.messages[data.messages.length - 1].text;
                        document.getElementById('alert-text').innerText = lastMsg;
                        document.getElementById('message-alert').classList.remove('hidden');
                        addLog(`MESSAGE RECV: ${lastMsg}`);
                        if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
                    }
                });
            };

            watchId = navigator.geolocation.watchPosition(sendUpdate, null, { enableHighAccuracy: true });
            setInterval(() => navigator.geolocation.getCurrentPosition(sendUpdate), 10000);
        };

        document.getElementById('stop-tracking').onclick = () => location.reload();
    </script>
</body>
</html>
